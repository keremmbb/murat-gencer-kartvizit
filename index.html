<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Murat GENCER - Dijital Kartvizit</title>
    <style>
        :root {
            --primary-blue: #1a2a4e; 
            --whatsapp-green: #25D366;
            --phone-blue: #007AFF;
            --email-orange: #FF9500;
            --linkedin-blue: #0077B5;
            --text-dark: #2c3e50;
        }

        /* --- ANİMASYONLAR --- */
        @keyframes cardEntry {
            0% { opacity: 0; transform: translateY(60px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes itemFadeIn {
            0% { opacity: 0; transform: translateX(-20px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #e0e4e8 0%, #cfd9df 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            perspective: 2000px;
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        .wrapper {
            width: 90%;
            max-width: 380px;
            position: relative;
            animation: cardEntry 1s cubic-bezier(0.2, 1, 0.3, 1) forwards;
        }

        .card-container {
            width: 100%;
            height: 640px; 
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 32px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- KATMAN YÖNETİMİ --- */
        .card-front { z-index: 2; transform: rotateY(0deg); }
        .card-back { z-index: 1; transform: rotateY(180deg); background: linear-gradient(180deg, #ffffff 0%, #f1f4f8 100%); }
        .is-flipped .card-front { z-index: 1; }
        .is-flipped .card-back { z-index: 3; }

        /* --- ÜST TASARIM --- */
        .flip-icon-top {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 34px;
            height: 34px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            z-index: 10;
        }
        .flip-icon-top svg { fill: white; width: 20px; height: 20px; }

        .header {
            background-color: var(--primary-blue);
            padding: 45px 20px;
            color: white;
            text-align: center;
            position: relative;
        }
        .user-name { font-size: 26px; margin: 10px 0; font-weight: 700; }
        .content { padding: 20px 25px; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        
        /* --- BUTONLAR --- */
        .actions { display: flex; flex-direction: column; gap: 12px; }
        
        .btn {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            padding: 14px; border-radius: 16px; text-decoration: none; font-weight: 600;
            color: white; border: none; font-size: 14px; 
            transition: transform 0.3s ease, box-shadow 0.3s ease, filter 0.3s ease;
            opacity: 0;
            animation: itemFadeIn 0.5s ease forwards;
            cursor: pointer;
        }

        .btn:hover { 
            transform: scale(1.05) !important; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.15); 
            filter: brightness(1.1);
        }

        .btn svg { fill: white; width: 18px; height: 18px; }
        .btn-save { background-color: var(--primary-blue); animation-delay: 0.4s; }
        .btn-call { background-color: var(--phone-blue); animation-delay: 0.5s; }
        .btn-whatsapp { background-color: var(--whatsapp-green); animation-delay: 0.6s; }
        .btn-mail { background-color: var(--email-orange); animation-delay: 0.7s; }
        .btn-linkedin { background-color: var(--linkedin-blue); animation-delay: 0.8s; }

        /* --- ARKA YÜZ DETAYLARI --- */
        .company-logo { width: 220px; margin-bottom: 30px; object-fit: contain; opacity: 0; animation: itemFadeIn 0.8s ease forwards; animation-delay: 0.3s; }
        .info-list { width: 100%; display: flex; flex-direction: column; gap: 15px; }

        .info-card {
            display: flex; align-items: center; gap: 12px;
            padding: 15px; background: #f0f3f7; border-radius: 18px; border: 1.5px solid #d1d9e6;
            text-decoration: none; transition: transform 0.4s ease, background 0.3s ease;
        }

        .info-card:hover { background: #ffffff; transform: translateX(8px); border-color: var(--primary-blue); }
        .info-icon svg { fill: var(--primary-blue); width: 22px; height: 22px; }
        .info-text { font-size: 13px; color: var(--text-dark); text-align: left; font-weight: 500; line-height: 1.4; }
        .info-label { font-size: 10px; color: #5a67d8; font-weight: 800; text-transform: uppercase; margin-bottom: 3px; display: block; }

        .flip-hint-bar { padding: 12px; font-size: 11px; text-align: center; font-weight: 600; }
    </style>
</head>

<script>
    function handleCardClick(event) {
        if (event.target.closest('.btn') || event.target.closest('.info-card')) return;
        
        document.getElementById('card').classList.toggle('is-flipped');
        if ("vibrate" in navigator) navigator.vibrate(15);
    }

    function downloadVCard(event) {
        event.stopPropagation();
        const vcard = "BEGIN:VCARD\nVERSION:3.0\nFN:Murat GENCER\nORG:Hedef Technology Solutions\nTITLE:General Manager\nTEL:+905335298119\nEMAIL:murat.gencer@hedefsolutions.com\nADR:;;Acıbadem Mah. Çiftlik Sokak No: 8/B;Kadıköy;İstanbul;;Turkey\nEND:VCARD";
        const blob = new Blob([vcard], { type: "text/vcard" });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "MuratGencer.vcf";
        a.click();
    }
</script>
